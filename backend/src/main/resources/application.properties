# ==============================================================
# CONFIGURAÇŐES DE CONEXĂO COM O POSTGRESQL
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/disconnect_db

# O usuário padrăo do PostgreSQL (geralmente é postgres)
spring.datasource.username=postgres

spring.datasource.password=uma_senha_qualquer

# ==============================================================
# CONFIGURAÇŐES DO SPARK
# ==============================================================
app.port=8080
app.cors.allowed-origin=http://localhost:5173

# ==============================================================
# CONFIGURAÇŐES DO FLYWAY
# ==============================================================

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ==============================================================
# CONFIGURAÇŐES DO HIBERNATE (JPA) // Se for permitido no futuro (ainda em aberto)
# ==============================================================

spring.jpa.hibernate.ddl-auto=validate

# Mostra no terminal os comandos SQL que o Java está executando (ótimo para estudos)
spring.jpa.show-sql=true